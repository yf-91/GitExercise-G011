<!DOCTYPE html>
<html>
<head>
    <title>MMU Lost Hub</title>
    {% load static %}
    <link rel="stylesheet" type="text/css" href="{% static 'user/css/user-login.css' %}">
</head>
<body>
    <div class="whole-page">
        <header>
            <img src="{% static 'images/MMU Logo.png %}" alt="MMU Logo" class="mmu-logo">
        </header>

        <div class="content">
            <div class="banner">
                <div class="web-logo">
                    <img src="{% static 'images/Web Logo.png' %}" alt="MMU Lost Hub Logo" class="losthub-logo">
                </div>

                <div class="slogan">
                    <p>
                        What's lost can be found,<br>
                    and found can find its way back.
                    </p>

                    <h2>Welcome to MMU Lost Hub</h2>
                    <h3>User Login</h3>

                    <form method="POST">
                        {% csrf_token %}

                        <input type="text" id="email" name="email" placeholder="MMU Email" oninput="checkEmail()">
                        <p id="email-status"></p>
                        {% if email_error %}
                            <p style="color:red;">{{ email_error }}</p>
                        {% endif %}
                        <!--Password-->
                        <div class="password-box">
                            <input type="password" id="password" name="password" placeholder="Password" oninput="checkPassword()">
                            <span class="show-password" onclick="showPassword('password', this)">🙈</span>
                        </div>
                        {% if password_error %}
                        <p style="color:red;">{{ password_error }}</p>
                        {% endif %}

                        <label>
                            <input type="checkbox" onclick="togglePassword()">
                        </label>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
